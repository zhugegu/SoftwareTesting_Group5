name: Member D Marshal Stability Tests

on:
  push:
    branches:
      - main
      - member-d-marshal-tests
  pull_request:
  workflow_dispatch:

jobs:
  member-d-tests:
    name: Member D - ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Clean previous member D results
        run: |
          python -c "import shutil, pathlib; p=pathlib.Path('member_d/results'); shutil.rmtree(p, ignore_errors=True); p.mkdir(parents=True, exist_ok=True)"

      - name: Run member D marshal tests
        run: python member_d/member_d_marshal_tests.py

      - name: Summarize member D results
        run: python member_d/summarize_member_d_results.py

      - name: Upload member D results
        uses: actions/upload-artifact@v4
        with:
          name: member-d-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            member_d/results/*.json
            member_d/results/*.md