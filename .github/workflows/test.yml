name: Cross-Platform Marshal Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Display environment
      run: |
        echo "=== Environment Information ==="
        echo "OS: ${{ matrix.os }}"
        echo "Python: $(python --version)"
        echo "Platform: $(python -c 'import platform; print(platform.platform())')"

    - name: Run tests
      run: python -m unittest test_member_a -v

    - name: Generate test summary
      run: |
        python -m unittest test_member_a 2>&1 | tee test_output_${{ matrix.os }}_py${{ matrix.python-version }}.txt

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.os }}-py${{ matrix.python-version }}
        path: test_output_*.txt
        retention-days: 30
